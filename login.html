<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillOS — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --blue:#3B5FE2;
    --blue-dark:#2E4BC4;
    --bg-top:#E9ECF8;
    --bg-bottom:#DDE2F2;
    --ink:#1A1D29;
    --muted:#6B7280;
    --card:#FFFFFF;
    --border:#E5E7F0;
    --error:#DC2626;
    --amber-bg:#FCEBC5;
    --amber-text:#B7791F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    color:var(--ink);
  }
  .topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:20px 24px;
    background:#fff;
    border-bottom:1px solid var(--border);
  }
  .logo{
    width:44px; height:44px;
    background:var(--blue);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:20px;
  }
  .brand{ font-size:22px; font-weight:800; }

  .wrap{
    max-width:420px;
    margin:36px auto;
    padding:0 20px;
  }
  .tabs{
    display:flex;
    background:#fff;
    border-radius:14px;
    padding:4px;
    border:1px solid var(--border);
    margin-bottom:20px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .tab.active{
    background:var(--blue);
    color:#fff;
  }

  .card{
    background:var(--card);
    border-radius:18px;
    padding:26px 22px;
    box-shadow:0 8px 24px rgba(59,95,226,0.08);
    border:1px solid var(--border);
  }
  .card h2{
    margin:0 0 6px;
    font-size:20px;
    font-weight:800;
  }
  .card p.sub{
    margin:0 0 20px;
    font-size:13px;
    color:var(--muted);
  }

  label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  input{
    width:100%;
    padding:13px 14px;
    margin-bottom:16px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#F8F9FD;
    font-size:14px;
    outline:none;
    transition:border-color .2s;
  }
  input:focus{ border-color:var(--blue); }

  .btn{
    width:100%;
    padding:14px 0;
    border:none;
    border-radius:14px;
    background:var(--blue);
    color:#fff;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
    transition:background .2s;
  }
  .btn:hover{ background:var(--blue-dark); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; }

  .msg{
    margin-top:14px;
    font-size:13px;
    padding:10px 12px;
    border-radius:10px;
    display:none;
  }
  .msg.error{ display:block; background:#FEECEC; color:var(--error); }
  .msg.success{ display:block; background:#E7F8EE; color:#16A34A; }

  .role-note{
    margin-top:18px;
    font-size:12px;
    color:var(--muted);
    text-align:center;
  }
  .badge{
    display:inline-block;
    background:var(--amber-bg);
    color:var(--amber-text);
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
  }
  .hidden{ display:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">B</div>
  <div class="brand">BillOS</div>
</div>

<div class="wrap">
  <div class="tabs">
    <div class="tab active" id="tab-login">Login</div>
    <div class="tab" id="tab-signup">Sign Up</div>
  </div>

  <!-- LOGIN CARD -->
  <div class="card" id="login-card">
    <h2>Welcome back</h2>
    <p class="sub">Log in to your BillOS account</p>
    <form id="login-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@shop.com" required>
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required>
      <button type="submit" class="btn" id="login-btn">Log In</button>
    </form>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP CARD -->
  <div class="card hidden" id="signup-card">
    <h2>Create your shop</h2>
    <p class="sub">You'll be set up as the <span class="badge">Owner</span></p>
    <form id="signup-form">
      <label for="signup-name">Full Name</label>
      <input type="text" id="signup-name" placeholder="Your name" required>
      <label for="signup-shop">Shop Name</label>
      <input type="text" id="signup-shop" placeholder="e.g. Araf's Grocery" required>
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="you@shop.com" required>
      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6">
      <button type="submit" class="btn" id="signup-btn">Create Account</button>
    </form>
    <div class="msg" id="signup-msg"></div>
  </div>

  <div class="role-note">Only Owners and Authority can add Sales Executive accounts after login.</div>
</div>

<script>
  // ---- Supabase setup ----
  const SUPABASE_URL = "https://ektdcnvraluuwxmqhjvj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yTDG8ujXgVE81BNAvPvZlw_tlbfKNTm";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ---- Tab switching ----
  const tabLogin = document.getElementById('tab-login');
  const tabSignup = document.getElementById('tab-signup');
  const loginCard = document.getElementById('login-card');
  const signupCard = document.getElementById('signup-card');

  tabLogin.onclick = () => {
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
    loginCard.classList.remove('hidden');
    signupCard.classList.add('hidden');
  };
  tabSignup.onclick = () => {
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
    signupCard.classList.remove('hidden');
    loginCard.classList.add('hidden');
  };

  function showMsg(el, text, type){
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // ---- Login ----
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const msg = document.getElementById('login-msg');
    btn.disabled = true; btn.textContent = 'Logging in...';

    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    btn.disabled = false; btn.textContent = 'Log In';

    if (error) {
      showMsg(msg, error.message.includes('Invalid') ? 'Wrong email or password.' : error.message, 'error');
      return;
    }
    showMsg(msg, 'Logged in! Redirecting...', 'success');
    // TODO: redirect to dashboard, e.g. window.location.href = '/dashboard.html';
  });

  // ---- Signup ----
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const msg = document.getElementById('signup-msg');
    btn.disabled = true; btn.textContent = 'Creating...';

    const fullName = document.getElementById('signup-name').value;
    const shopName = document.getElementById('signup-shop').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    // 1. Create auth user
    const { data: authData, error: authError } = await sb.auth.signUp({ email, password });

    if (authError) {
      btn.disabled = false; btn.textContent = 'Create Account';
      showMsg(msg, authError.message.includes('already') ? 'This email is already registered.' : authError.message, 'error');
      return;
    }

    const userId = authData.user?.id;
    if (!userId) {
      btn.disabled = false; btn.textContent = 'Create Account';
      showMsg(msg, 'Check your email to confirm your account, then log in.', 'success');
      return;
    }

    // 2. Create shop
    const { data: shop, error: shopError } = await sb
      .from('shops')
      .insert({ name: shopName })
      .select()
      .single();

    if (shopError) {
      btn.disabled = false; btn.textContent = 'Create Account';
      showMsg(msg, 'Account created, but shop setup failed: ' + shopError.message, 'error');
      return;
    }

    // 3. Create profile linked to shop, role = owner
    const { error: profileError } = await sb
      .from('profiles')
      .insert({ id: userId, shop_id: shop.id, full_name: fullName, role: 'owner' });

    btn.disabled = false; btn.textContent = 'Create Account';

    if (profileError) {
      showMsg(msg, 'Shop created, but profile setup failed: ' + profileError.message, 'error');
      return;
    }

    showMsg(msg, 'Shop created! You are the Owner. Redirecting...', 'success');
    // TODO: redirect to dashboard, e.g. window.location.href = '/dashboard.html';
  });
</script>

</body>
</html>
