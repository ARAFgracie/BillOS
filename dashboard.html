<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillOS — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --blue:#3B5FE2;
    --ink:#1A1D29;
    --muted:#5B6270;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-bg-strong:rgba(255,255,255,0.75);
    --glass-border:rgba(255,255,255,0.6);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(120,150,255,0.35), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(255,180,220,0.3), transparent 45%),
      radial-gradient(circle at 30% 80%, rgba(150,220,255,0.3), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(190,160,255,0.3), transparent 40%),
      linear-gradient(160deg, #EEF0FA, #E2E6F5);
    background-attachment:fixed;
  }
  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border:1px solid var(--glass-border);
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:14px 20px;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border-bottom:1px solid var(--glass-border);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .logo{
    width:38px; height:38px;
    background:linear-gradient(135deg, var(--blue), #6C8CFF);
    border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:17px;
    box-shadow:0 4px 12px rgba(59,95,226,0.35);
  }
  .brand-name{ font-size:18px; font-weight:800; }
  .role-pill{ border-radius:20px; padding:7px 15px; font-size:12px; font-weight:700; text-transform:capitalize; }

  .content{ padding:22px 18px; max-width:600px; margin:0 auto; }
  .content h1{ font-size:23px; margin:0 0 4px; }
  .shopname{ font-size:13px; color:var(--muted); margin-bottom:22px; }

  .nav-grid{ display:flex; flex-direction:column; gap:12px; }
  .nav-card{
    display:flex; align-items:center; gap:14px;
    border-radius:18px; padding:16px 18px;
    text-decoration:none; color:var(--ink);
    box-shadow:0 8px 24px rgba(59,95,226,0.08);
  }
  .nav-card .icon{
    width:44px; height:44px; border-radius:13px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; background:rgba(59,95,226,0.12);
    flex-shrink:0;
  }
  .nav-card .label{ font-weight:800; font-size:15px; }
  .nav-card .desc{ font-size:12px; color:var(--muted); margin-top:2px; }
  .nav-card .arrow{ margin-left:auto; color:var(--muted); font-size:18px; }
  .nav-card.hidden{ display:none; }

  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>

<div id="loading" class="loading">Loading BillOS...</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-name">BillOS</div>
    </div>
    <div class="role-pill glass" id="role-pill">—</div>
  </div>

  <div class="content">
    <h1 id="greeting">Welcome</h1>
    <div class="shopname" id="shop-name"></div>

    <div class="nav-grid">
      <a href="billing.html" class="nav-card glass">
        <div class="icon">🛒</div>
        <div>
          <div class="label">Billing</div>
          <div class="desc">Create a new bill</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="inventory.html" class="nav-card glass" id="nav-inventory">
        <div class="icon">📦</div>
        <div>
          <div class="label">Inventory</div>
          <div class="desc">Add and manage products</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="bills.html" class="nav-card glass">
        <div class="icon">🧾</div>
        <div>
          <div class="label">Bills</div>
          <div class="desc">View sales history</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="analytics.html" class="nav-card glass" id="nav-analytics">
        <div class="icon">📊</div>
        <div>
          <div class="label">Analytics</div>
          <div class="desc">Product performance</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="reports.html" class="nav-card glass" id="nav-reports">
        <div class="icon">📈</div>
        <div>
          <div class="label">Reports</div>
          <div class="desc">Sales reports</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ektdcnvraluuwxmqhjvj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yTDG8ujXgVE81BNAvPvZlw_tlbfKNTm";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: p, error } = await sb
      .from('profiles')
      .select('full_name, role, shop_id, shops(name)')
      .eq('id', session.user.id)
      .single();

    if (error || !p) {
      document.getElementById('loading').textContent = 'Could not load your profile. Please contact support.';
      return;
    }

    document.getElementById('greeting').textContent = 'Welcome, ' + (p.full_name || 'there');
    document.getElementById('shop-name').textContent = p.shops?.name || '';
    document.getElementById('role-pill').textContent = p.role.replace('_', ' ');

    if (p.role === 'sales_executive') {
      document.getElementById('nav-inventory').classList.add('hidden');
      document.getElementById('nav-analytics').classList.add('hidden');
      document.getElementById('nav-reports').classList.add('hidden');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  init();
</script>

</body>
</html>
