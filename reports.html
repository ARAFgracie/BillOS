<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillOS — Reports</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --blue:#3B5FE2;
    --ink:#1A1D29;
    --muted:#5B6270;
    --green:#16A34A;
    --amber-text:#B7791F;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-bg-strong:rgba(255,255,255,0.75);
    --glass-border:rgba(255,255,255,0.6);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(120,150,255,0.35), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(255,180,220,0.3), transparent 45%),
      radial-gradient(circle at 30% 80%, rgba(150,220,255,0.3), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(190,160,255,0.3), transparent 40%),
      linear-gradient(160deg, #EEF0FA, #E2E6F5);
    background-attachment:fixed;
  }
  .glass{
    background:linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.35));
    backdrop-filter:blur(30px) saturate(200%);
    -webkit-backdrop-filter:blur(30px) saturate(200%);
    border:1px solid rgba(255,255,255,0.65);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.85);
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45));
    backdrop-filter:blur(36px) saturate(200%);
    -webkit-backdrop-filter:blur(36px) saturate(200%);
    border-bottom:1px solid rgba(255,255,255,0.6);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 4px 20px rgba(59,95,226,0.06);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .logo{
    width:38px; height:38px; background:linear-gradient(135deg, var(--blue), #6C8CFF);
    border-radius:11px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:17px;
  }
  .brand-name{ font-size:18px; font-weight:800; }
  .back-link{ font-size:13px; color:var(--blue); font-weight:700; text-decoration:none; }

  .content{ padding:20px 18px; max-width:600px; margin:0 auto; }
  .content h1{ font-size:21px; margin:0 0 16px; }

  .filters{ display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .filter-btn{
    flex:1; text-align:center; padding:10px 0; border-radius:12px;
    font-weight:700; font-size:13px; cursor:pointer; color:var(--muted);
    background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.3));
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8);
  }
  .filter-btn.active{ background:var(--blue); color:#fff; border-color:var(--blue); }

  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .stat{ border-radius:16px; padding:16px; }
  .stat .label{ font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; }
  .stat .num{ font-size:22px; font-weight:800; }

  .txn-note{ font-size:12px; color:var(--muted); text-align:center; margin-bottom:16px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>

<div id="loading" class="loading">Loading BillOS...</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-name">BillOS</div>
    </div>
    <a href="dashboard.html" class="back-link">← Dashboard</a>
  </div>

  <div class="content">
    <h1>Sales Report</h1>

    <div class="filters">
      <div class="filter-btn glass active" data-range="today">Today</div>
      <div class="filter-btn glass" data-range="week">This Week</div>
      <div class="filter-btn glass" data-range="month">This Month</div>
    </div>

    <div class="stat-grid">
      <div class="stat glass"><div class="label">Sales</div><div class="num" id="stat-sales">৳0</div></div>
      <div class="stat glass"><div class="label">Collected</div><div class="num" id="stat-collected" style="color:var(--green)">৳0</div></div>
    </div>

    <div class="txn-note" id="txn-count">0 transactions in this period</div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ektdcnvraluuwxmqhjvj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yTDG8ujXgVE81BNAvPvZlw_tlbfKNTm";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let shopId = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: profile, error } = await sb
      .from('profiles')
      .select('shop_id')
      .eq('id', session.user.id)
      .single();

    if (error || !profile) {
      document.getElementById('loading').textContent = 'Could not load your profile.';
      return;
    }
    shopId = profile.shop_id;

    await loadReport('today');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  function getStartDate(range) {
    const now = new Date();
    if (range === 'today') {
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    if (range === 'week') {
      const day = now.getDay();
      const diff = now.getDate() - day;
      return new Date(now.getFullYear(), now.getMonth(), diff);
    }
    if (range === 'month') {
      return new Date(now.getFullYear(), now.getMonth(), 1);
    }
    return new Date(0);
  }

  async function loadReport(range) {
    const start = getStartDate(range);
    const { data } = await sb
      .from('invoices')
      .select('total_amount, created_at')
      .eq('shop_id', shopId)
      .gte('created_at', start.toISOString());

    const total = (data || []).reduce((sum, i) => sum + Number(i.total_amount), 0);
    document.getElementById('stat-sales').textContent = '৳' + total.toFixed(0);
    document.getElementById('stat-collected').textContent = '৳' + total.toFixed(0);
    document.getElementById('txn-count').textContent = (data ? data.length : 0) + ' transactions in this period';
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadReport(btn.dataset.range);
    });
  });

  init();
</script>

</body>
</html>
