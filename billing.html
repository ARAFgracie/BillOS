<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BillOS — Billing</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
<link rel="stylesheet" href="layout.css">
<script src="layout.js" defer></script>
<style>
  :root{
    --blue:#22C55E;
    --blue-dark:#16A34A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom:100px;
  }
  .topbar{
    will-change:transform;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px;
    background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45));
    backdrop-filter:blur(20px) saturate(150%);
    -webkit-backdrop-filter:blur(20px) saturate(150%);
    border-bottom:1px solid rgba(255,255,255,0.6);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 4px 20px rgba(34,197,94,0.06);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .logo{
    width:40px; height:40px; background:var(--blue); border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:18px;
  }
  .brand-name{ font-size:19px; font-weight:800; }
  .back-link{ font-size:13px; color:var(--blue); font-weight:700; text-decoration:none; }

  .content{ padding:20px; max-width:600px; margin:0 auto; }
  .content h1{ font-size:22px; margin:0 0 4px; }
  .sub{ font-size:13px; color:var(--muted); margin-bottom:14px; }

  .search{
    width:100%; padding:14px 16px; margin-bottom:8px;
    border-radius:14px; border:1.5px solid rgba(34,197,94,0.5);
    background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.3));
    backdrop-filter:blur(16px) saturate(150%);
    -webkit-backdrop-filter:blur(16px) saturate(150%);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8);
    font-size:16px; outline:none;
  }
  .hint{ font-size:11.5px; color:var(--muted); margin-bottom:16px; }
  .hint b{ color:var(--blue); }

  .row-head{
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase;
    padding:0 4px; margin-bottom:6px;
  }

  .item-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid var(--border); border-radius:14px;
    padding:12px 14px; margin-bottom:8px;
  }
  .item-row.just-added{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
  .i-name{ font-weight:700; font-size:14px; }
  .i-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .i-right{ display:flex; align-items:center; gap:10px; }
  .qty-input{
    width:56px; padding:7px 4px; border-radius:10px; border:1px solid var(--border);
    font-size:16px; text-align:center; font-weight:700; outline:none;
  }
  .qty-input:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
  .i-total{ font-weight:800; font-size:14px; min-width:56px; text-align:right; }
  .remove-btn{
    width:28px; height:28px; border-radius:8px; border:none;
    background:#FEECEC; color:#DC2626; font-size:14px; cursor:pointer;
  }

  .empty-card{
    background:#fff; border:1px dashed var(--border); border-radius:14px;
    padding:28px; text-align:center; color:var(--muted); font-size:13px;
  }

  .cart-bar{
    will-change:transform;
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.5));
    backdrop-filter:blur(20px) saturate(150%);
    -webkit-backdrop-filter:blur(20px) saturate(150%);
    border-top:1px solid rgba(255,255,255,0.6);
    padding:14px 20px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 -8px 32px rgba(26,29,41,0.12);
  }
  .cart-row{ display:flex; justify-content:space-between; align-items:center; max-width:600px; margin:0 auto; }
  .cart-info{ font-size:13px; color:var(--muted); }
  .cart-total{ font-size:20px; font-weight:800; }
  .charge-btn{
    background:var(--blue); color:#fff; border:none; border-radius:14px;
    padding:14px 26px; font-weight:800; font-size:15px; cursor:pointer;
  }
  .charge-btn:disabled{ opacity:.5; cursor:not-allowed; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(26,29,41,0.5);
    display:none; align-items:flex-end; justify-content:center; z-index:10;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:#fff; border-radius:20px 20px 0 0; padding:24px 20px 28px;
    width:100%; max-width:600px;
  }
  .modal h3{ margin:0 0 16px; }
  .pay-options{ display:flex; gap:10px; margin-bottom:20px; }
  .pay-opt{
    flex:1; text-align:center; padding:12px 0; border-radius:12px;
    border:1.5px solid rgba(0,0,0,0.08); font-weight:700; font-size:14px; cursor:pointer; color:var(--muted);
    background:linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.25));
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
  }
  .pay-opt.selected{
    border-color:var(--blue); color:var(--blue);
    background:linear-gradient(180deg, rgba(238,241,252,0.85), rgba(238,241,252,0.5));
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);
  }
  .confirm-btn{
    width:100%; padding:14px 0; border:none; border-radius:14px;
    background:var(--green); color:#fff; font-weight:800; font-size:15px; cursor:pointer;
  }
  .cancel-link{ display:block; text-align:center; margin-top:12px; color:var(--muted); font-size:13px; }
  .msg{ margin-top:12px; font-size:13px; padding:10px; border-radius:10px; display:none; }
  .msg.error{ display:block; background:#FEECEC; color:#DC2626; }
  .msg.success{ display:block; background:#E7F8EE; color:#16A34A; }

  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:8px 16px; border-radius:20px;
    font-size:12.5px; font-weight:600; opacity:0; transition:opacity .2s; z-index:30;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div id="loading" class="loading">Loading BillOS...</div>
<div class="toast" id="toast"></div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-name">BillOS</div>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <a href="dashboard.html" class="back-link">← Dashboard</a>
      <div class="theme-switcher">
        <div class="theme-toggle glass" id="theme-toggle" onclick="toggleThemeMenu()">🎨</div>
        <div class="theme-menu glass" id="theme-menu"></div>
      </div>
    </div>
  </div>

  <div class="content">
    <h1>New Bill</h1>
    <div class="sub">Type a product code or name, then press Enter to add</div>
    <input type="text" class="search" id="search" placeholder="Scan or type product code / name..." autocomplete="off">
    <div class="hint">Press <b>F1 twice</b> to edit the quantity of the last added item, then press Enter to confirm.</div>

    <div id="row-head-wrap"></div>
    <div id="product-list"></div>
  </div>

  <div class="cart-bar">
    <div class="cart-row">
      <div class="cart-info" id="cart-info">0 items</div>
      <div class="cart-total" id="cart-total">৳0</div>
      <button class="charge-btn" id="charge-btn" disabled>Charge</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Complete Bill — <span id="modal-total"></span></h3>
    <div class="pay-options">
      <div class="pay-opt selected" data-method="cash">Cash</div>
      <div class="pay-opt" data-method="card">Card</div>
    </div>
    <button class="confirm-btn" id="confirm-btn">Confirm Payment</button>
    <div class="msg" id="charge-msg"></div>
    <a href="#" class="cancel-link" id="cancel-link">Cancel</a>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ektdcnvraluuwxmqhjvj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yTDG8ujXgVE81BNAvPvZlw_tlbfKNTm";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let profile = null;
  let products = [];
  let cart = {};       // productId -> { product, qty }
  let cartOrder = [];  // ordered list of productIds, most recent last
  let selectedPayment = 'cash';
  let lastF1Time = 0;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: p, error } = await sb
      .from('profiles')
      .select('id, full_name, role, shop_id')
      .eq('id', session.user.id)
      .single();

    if (error || !p) {
      document.getElementById('loading').textContent = 'Could not load your profile.';
      return;
    }
    profile = p;

    await loadProducts();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('search').focus();
  }

  async function loadProducts() {
    const { data } = await sb
      .from('products')
      .select('*')
      .eq('shop_id', profile.shop_id)
      .not('code', 'is', null)
      .neq('code', '')
      .order('name');
    products = data || [];
    renderCart();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1200);
  }

  // ---------- Search + Enter to add ----------
  function findProduct(query) {
    const q = query.trim().toLowerCase();
    if (!q) return null;
    // Exact code match first
    let match = products.find(p => (p.code || '').toLowerCase() === q);
    if (match) return match;
    // Fallback: name contains query, only if exactly one match
    const nameMatches = products.filter(p => p.name.toLowerCase().includes(q));
    if (nameMatches.length === 1) return nameMatches[0];
    return null;
  }

  document.getElementById('search').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const input = e.target;
    const query = input.value;
    const product = findProduct(query);

    if (!product) {
      showToast('No matching product found');
      return;
    }

    if (cart[product.id]) {
      cart[product.id].qty += 1;
    } else {
      cart[product.id] = { product, qty: 1 };
      cartOrder = cartOrder.filter(id => id !== product.id);
    }
    // Move to end (most recent)
    cartOrder = cartOrder.filter(id => id !== product.id);
    cartOrder.push(product.id);

    input.value = '';
    renderCart(product.id);
    input.focus();
  });

  // ---------- F1 double-press to edit last item's quantity ----------
  document.addEventListener('keydown', (e) => {
    if (e.key === 'F1') {
      e.preventDefault();
      const now = Date.now();
      if (now - lastF1Time < 500) {
        // Double press detected
        const lastId = cartOrder[cartOrder.length - 1];
        if (lastId) {
          const qtyInput = document.getElementById('qty-' + lastId);
          if (qtyInput) {
            qtyInput.focus();
            qtyInput.select();
          }
        }
        lastF1Time = 0;
      } else {
        lastF1Time = now;
      }
    }
  });

  // ---------- Render cart rows ----------
  function renderCart(justAddedId) {
    const container = document.getElementById('product-list');
    const headWrap = document.getElementById('row-head-wrap');

    if (!cartOrder.length) {
      headWrap.innerHTML = '';
      container.innerHTML = '<div class="empty-card">No items yet. Type a product code and press Enter to start the bill.</div>';
      updateCartBar();
      return;
    }

    headWrap.innerHTML = '<div class="row-head"><span>Item</span><span>Qty · Total</span></div>';

    container.innerHTML = cartOrder.map(id => {
      const entry = cart[id];
      if (!entry) return '';
      const p = entry.product;
      const lineTotal = (entry.qty * p.price).toFixed(2);
      const justAdded = id === justAddedId ? ' just-added' : '';
      return `
        <div class="item-row${justAdded}">
          <div>
            <div class="i-name">${p.name}</div>
            <div class="i-meta">#${p.code || '—'} · ৳${p.price}/${p.unit}</div>
          </div>
          <div class="i-right">
            <input type="number" min="0" step="${p.is_weighted ? '0.01' : '1'}" class="qty-input" id="qty-${id}" value="${entry.qty}"
              onkeydown="handleQtyKeydown(event, '${id}')" onchange="updateQty('${id}', this.value)">
            <div class="i-total">৳${lineTotal}</div>
            <button class="remove-btn" onclick="removeItem('${id}')">✕</button>
          </div>
        </div>
      `;
    }).join('');

    updateCartBar();
  }

  window.handleQtyKeydown = function(e, id) {
    if (e.key === 'Enter') {
      e.preventDefault();
      updateQty(id, e.target.value);
      document.getElementById('search').focus();
    }
  };

  window.updateQty = function(id, value) {
    const entry = cart[id];
    if (!entry) return;
    let qty = parseFloat(value);
    if (!entry.product.is_weighted) qty = Math.round(qty);
    if (!qty || qty <= 0) {
      delete cart[id];
      cartOrder = cartOrder.filter(x => x !== id);
    } else {
      entry.qty = Math.round(qty * 100) / 100;
    }
    renderCart();
  };

  window.removeItem = function(id) {
    delete cart[id];
    cartOrder = cartOrder.filter(x => x !== id);
    renderCart();
  };

  function updateCartBar() {
    const items = cartOrder.map(id => cart[id]).filter(Boolean);
    const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
    const totalAmount = items.reduce((sum, i) => sum + i.qty * i.product.price, 0);

    document.getElementById('cart-info').textContent = totalQty.toFixed(totalQty % 1 === 0 ? 0 : 2) + ' item' + (totalQty !== 1 ? 's' : '');
    document.getElementById('cart-total').textContent = '৳' + totalAmount.toFixed(2);
    document.getElementById('charge-btn').disabled = items.length === 0;
  }

  // ---------- Checkout ----------
  document.getElementById('charge-btn').addEventListener('click', () => {
    const items = cartOrder.map(id => cart[id]).filter(Boolean);
    const totalAmount = items.reduce((sum, i) => sum + i.qty * i.product.price, 0);
    document.getElementById('modal-total').textContent = '৳' + totalAmount.toFixed(2);
    document.getElementById('modal-overlay').classList.add('open');
  });
  document.getElementById('cancel-link').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('modal-overlay').classList.remove('open');
  });

  document.querySelectorAll('.pay-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedPayment = opt.dataset.method;
    });
  });

  document.getElementById('confirm-btn').addEventListener('click', async () => {
    const btn = document.getElementById('confirm-btn');
    const msg = document.getElementById('charge-msg');
    btn.disabled = true; btn.textContent = 'Processing...';

    const items = cartOrder.map(id => cart[id]).filter(Boolean);
    const totalAmount = items.reduce((sum, i) => sum + i.qty * i.product.price, 0);

    const { data: invoice, error: invError } = await sb
      .from('invoices')
      .insert({
        shop_id: profile.shop_id,
        created_by: profile.id,
        total_amount: totalAmount,
        payment_method: selectedPayment
      })
      .select()
      .single();

    if (invError) {
      btn.disabled = false; btn.textContent = 'Confirm Payment';
      msg.textContent = 'Failed: ' + invError.message;
      msg.className = 'msg error';
      return;
    }

    const invoiceItems = items.map(i => ({
      invoice_id: invoice.id,
      product_id: i.product.id,
      quantity: i.qty,
      unit_price: i.product.price,
      line_total: i.qty * i.product.price
    }));

    const { error: itemsError } = await sb.from('invoice_items').insert(invoiceItems);

    if (itemsError) {
      btn.disabled = false; btn.textContent = 'Confirm Payment';
      msg.textContent = 'Invoice created but items failed: ' + itemsError.message;
      msg.className = 'msg error';
      return;
    }

    for (const i of items) {
      await sb.from('products')
        .update({ stock_quantity: i.product.stock_quantity - i.qty })
        .eq('id', i.product.id);
    }

    msg.textContent = 'Bill completed successfully!';
    msg.className = 'msg success';
    btn.textContent = 'Confirm Payment';

    setTimeout(() => {
      cart = {};
      cartOrder = [];
      renderCart();
      document.getElementById('modal-overlay').classList.remove('open');
      msg.className = 'msg';
      btn.disabled = false;
      loadProducts();
      document.getElementById('search').focus();
    }, 1200);
  });

  init();
</script>

</body>
</html>
