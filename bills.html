<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillOS — Bills</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --blue:#3B5FE2;
    --ink:#1A1D29;
    --muted:#5B6270;
    --green:#16A34A;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-bg-strong:rgba(255,255,255,0.75);
    --glass-border:rgba(255,255,255,0.6);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(120,150,255,0.35), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(255,180,220,0.3), transparent 45%),
      radial-gradient(circle at 30% 80%, rgba(150,220,255,0.3), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(190,160,255,0.3), transparent 40%),
      linear-gradient(160deg, #EEF0FA, #E2E6F5);
    background-attachment:fixed;
  }
  .glass{
    background:linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.35));
    backdrop-filter:blur(30px) saturate(200%);
    -webkit-backdrop-filter:blur(30px) saturate(200%);
    border:1px solid rgba(255,255,255,0.65);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.85);
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45));
    backdrop-filter:blur(36px) saturate(200%);
    -webkit-backdrop-filter:blur(36px) saturate(200%);
    border-bottom:1px solid rgba(255,255,255,0.6);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 4px 20px rgba(59,95,226,0.06);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .logo{
    width:38px; height:38px; background:linear-gradient(135deg, var(--blue), #6C8CFF);
    border-radius:11px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:17px;
  }
  .brand-name{ font-size:18px; font-weight:800; }
  .back-link{ font-size:13px; color:var(--blue); font-weight:700; text-decoration:none; }

  .content{ padding:20px 18px; max-width:600px; margin:0 auto; }
  .content h1{ font-size:21px; margin:0 0 16px; }

  .bill-card{ border-radius:16px; padding:15px; margin-bottom:9px; }
  .bill-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .bill-id{ font-size:12px; color:var(--muted); font-weight:700; }
  .status-badge{
    background:rgba(220,252,231,0.9); color:var(--green);
    font-size:10.5px; font-weight:800; padding:3px 10px; border-radius:20px; text-transform:capitalize;
  }
  .bill-amount{ font-size:21px; font-weight:800; margin-bottom:5px; }
  .bill-meta{ font-size:11.5px; color:var(--muted); display:flex; gap:12px; }

  .empty-card{ border-radius:16px; padding:24px; text-align:center; }
  .empty-icon{ font-size:30px; margin-bottom:8px; }
  .empty-title{ font-weight:800; font-size:15px; margin-bottom:4px; }
  .empty-sub{ font-size:13px; color:var(--muted); }

  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>

<div id="loading" class="loading">Loading BillOS...</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-name">BillOS</div>
    </div>
    <a href="dashboard.html" class="back-link">← Dashboard</a>
  </div>

  <div class="content">
    <h1>Recent Bills</h1>
    <div id="bills-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://ektdcnvraluuwxmqhjvj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yTDG8ujXgVE81BNAvPvZlw_tlbfKNTm";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: profile, error } = await sb
      .from('profiles')
      .select('shop_id')
      .eq('id', session.user.id)
      .single();

    if (error || !profile) {
      document.getElementById('loading').textContent = 'Could not load your profile.';
      return;
    }

    await loadBills(profile.shop_id);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  async function loadBills(shopId) {
    const container = document.getElementById('bills-list');
    const { data, error } = await sb
      .from('invoices')
      .select('id, total_amount, payment_method, created_at')
      .eq('shop_id', shopId)
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) {
      container.innerHTML = '<div class="empty-card glass empty-sub">Could not load bills.</div>';
      return;
    }
    if (!data.length) {
      container.innerHTML = '<div class="empty-card glass"><div class="empty-icon">🧾</div><div class="empty-title">No bills yet</div><div class="empty-sub">Completed sales will show up here.</div></div>';
      return;
    }
    container.innerHTML = data.map(inv => {
      const shortId = '#' + inv.id.slice(0, 8).toUpperCase();
      const date = new Date(inv.created_at).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      return `
        <div class="bill-card glass">
          <div class="bill-top">
            <div class="bill-id">${shortId}</div>
            <div class="status-badge">completed</div>
          </div>
          <div class="bill-amount">৳${Number(inv.total_amount).toFixed(2)}</div>
          <div class="bill-meta"><span>${(inv.payment_method || 'cash')}</span><span>${date}</span></div>
        </div>
      `;
    }).join('');
  }

  init();
</script>

</body>
</html>
